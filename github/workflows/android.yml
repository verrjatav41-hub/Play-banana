name: Build Play Banana APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --force

      # STEP 1: Pehle Web Assets Build Karein (Ye Missing Tha)
      - name: Build Web Project
  run: npm run build
  working-directory: ./Play-banana # Agar aapka sara code is folder ke andar hai

      # STEP 2: Ab Capacitor Sync Karein (Taaki dist folder android mein jaye)
      - name: Sync Capacitor
        run: |
          npx cap add android || true
          npx cap sync android

      # STEP 3: Ab APK Generate Karein
      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Play-Banana-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
